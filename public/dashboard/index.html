<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jayden Kai Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --cream:#FBF7F1;
  --paper:#FFFFFF;
  --blush:#E9D8C9;
  --sage:#93A17E;
  --sage-dark:#5B6B4E;
  --gold:#B08D57;
  --gold-soft:#DCC7A0;
  --ink:#3A3A33;
  --danger:#D9534F;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Montserrat',sans-serif;
  font-weight:300;
}

/* ---------- HEADER ---------- */
.header{
  padding:22px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  box-shadow:0 2px 15px rgba(0,0,0,.05);
  position:sticky;
  top:0;
  z-index:50;
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:1.9rem;
  color:var(--sage-dark);
}

.logout-btn{
  border:none;
  background:var(--sage-dark);
  color:white;
  padding:10px 20px;
  border-radius:12px;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  font-size:.85rem;
  transition:background .2s ease;
}
.logout-btn:hover{ background:var(--gold); }

.container{
  padding:30px;
  max-width:1300px;
  margin:auto;
}

/* ---------- TABS ---------- */
.tab-bar{
  display:inline-flex;
  gap:4px;
  background:white;
  padding:6px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
  margin-bottom:30px;
}

.tab-btn{
  border:none;
  background:none;
  padding:11px 22px;
  border-radius:11px;
  font-family:'Montserrat',sans-serif;
  font-size:.88rem;
  font-weight:500;
  color:#888;
  cursor:pointer;
  transition:background .2s ease, color .2s ease;
}

.tab-btn.active{
  background:var(--sage-dark);
  color:white;
}

.tab-panel{ display:none; }
.tab-panel.active{ display:block; }

/* ---------- DASHBOARD TAB ---------- */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:26px;
}

.card{
  background:white;
  padding:24px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.card h3{
  font-size:.82rem;
  color:#888;
  font-weight:400;
  margin-bottom:10px;
}

.card .number{
  font-size:2.1rem;
  font-weight:600;
  color:var(--sage-dark);
  font-family:'Cormorant Garamond',serif;
}

.viz-grid{
  display:grid;
  grid-template-columns:1fr 1.2fr;
  gap:20px;
}

@media(max-width:820px){
  .viz-grid{ grid-template-columns:1fr; }
}

.viz-card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.viz-card h3{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;
  color:var(--sage-dark);
  margin-bottom:20px;
  align-self:flex-start;
}

.progress-ring-wrap{
  position:relative;
  width:180px;
  height:180px;
}

.progress-ring-wrap svg{ transform:rotate(-90deg); }

.progress-ring-bg{ stroke:#EFE9E0; }
.progress-ring-fill{
  stroke:var(--sage-dark);
  stroke-linecap:round;
  transition:stroke-dashoffset .6s ease;
}

.progress-ring-label{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.progress-ring-label .pct{
  font-family:'Cormorant Garamond',serif;
  font-size:2.1rem;
  color:var(--sage-dark);
  font-weight:600;
}

.progress-ring-label .sub{
  font-size:.72rem;
  color:#999;
  letter-spacing:.05em;
  text-transform:uppercase;
  margin-top:2px;
}

.doughnut-wrap{
  width:100%;
  max-width:260px;
  margin:0 auto;
}

.legend-row{
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
  margin-top:18px;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:.78rem;
  color:#666;
}

.legend-dot{
  width:10px; height:10px;
  border-radius:50%;
  display:inline-block;
}

/* ---------- SECTIONS (Invitations / RSVP) ---------- */
.section{
  background:white;
  padding:26px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.7rem;
  color:var(--sage-dark);
}

.header-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.search-box{
  position:relative;
}

.search-box input{
  padding:10px 14px 10px 36px;
  border:1px solid #e2ddd3;
  border-radius:12px;
  font-family:'Montserrat',sans-serif;
  font-size:.85rem;
  width:220px;
  outline:none;
  transition:border-color .2s ease;
}
.search-box input:focus{ border-color:var(--gold); }

.search-box::before{
  content:"";
  position:absolute;
  left:12px; top:50%;
  transform:translateY(-50%);
  width:14px; height:14px;
  background:#999;
  -webkit-mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>') no-repeat center;
  mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>') no-repeat center;
}

.add-btn{
  background:var(--gold);
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:12px;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  font-size:.85rem;
  white-space:nowrap;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  padding:14px;
  background:#fafafa;
  font-size:.78rem;
  letter-spacing:.03em;
  text-transform:uppercase;
  color:#888;
  font-weight:500;
}

td{
  padding:14px;
  border-top:1px solid #eee;
  font-size:.9rem;
}

.status-pill{
  display:inline-block;
  padding:4px 12px;
  border-radius:20px;
  font-size:.75rem;
  font-weight:500;
}
.status-confirmed{ background:#E6F0E4; color:var(--sage-dark); }
.status-not-attending{ background:#FBE9E7; color:var(--danger); }

.action-btn{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  margin-right:5px;
  font-family:'Montserrat',sans-serif;
  font-size:.8rem;
}

.edit{ background:#e9f4ff; }
.delete{ background:#ffeaea; color:var(--danger); }
.copy{ background:#f4f4f4; }

.empty-row td{
  text-align:center;
  color:#aaa;
  padding:34px;
  font-style:italic;
}

/* ---------- MODAL ---------- */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:20px;
}

.modal.show{ display:flex; }

.modal-content{
  background:white;
  padding:30px;
  border-radius:20px;
  width:95%;
  max-width:440px;
}

.modal-content h2{
  font-family:'Cormorant Garamond',serif;
  color:var(--sage-dark);
  margin-bottom:20px;
}

.modal-content label{
  display:block;
  font-size:.8rem;
  color:#777;
  margin-bottom:6px;
}

.modal-content input{
  width:100%;
  padding:12px;
  margin-bottom:16px;
  border:1px solid #ddd;
  border-radius:10px;
  font-family:'Montserrat',sans-serif;
  font-size:.92rem;
}

.save-btn{
  width:100%;
  padding:12px;
  background:var(--sage-dark);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  font-size:.9rem;
}

@media(max-width:768px){
  table{ display:block; overflow-x:auto; }
  .header{ padding:18px 20px; }
  .container{ padding:18px; }
  .section-header{ flex-direction:column; align-items:flex-start; }
  .search-box input{ width:100%; }
}

</style>
</head>
<body>

<div class="header">
  <div class="logo">Jayden Kai Dashboard</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" data-tab="invitations" onclick="switchTab('invitations')">Invitations</button>
    <button class="tab-btn" data-tab="rsvp" onclick="switchTab('rsvp')">RSVP</button>
  </div>

  <!-- ============ DASHBOARD TAB ============ -->
  <div class="tab-panel active" id="tab-dashboard">

    <div class="cards">
      <div class="card">
        <h3>Total Guests</h3>
        <div id="totalGuests" class="number">0</div>
      </div>
      <div class="card">
        <h3>Confirmed</h3>
        <div id="confirmedGuests" class="number">0</div>
      </div>
      <div class="card">
        <h3>Pending</h3>
        <div id="pendingGuests" class="number">0</div>
      </div>
      <div class="card">
        <h3>Not Attending</h3>
        <div id="notAttendingGuests" class="number">0</div>
      </div>
    </div>

    <div class="viz-grid">

      <div class="viz-card">
        <h3>Attendance Progress</h3>
        <div class="progress-ring-wrap">
          <svg width="180" height="180">
            <circle class="progress-ring-bg" cx="90" cy="90" r="78" stroke-width="14" fill="none"/>
            <circle id="progressRingFill" class="progress-ring-fill" cx="90" cy="90" r="78" stroke-width="14" fill="none"/>
          </svg>
          <div class="progress-ring-label">
            <span class="pct" id="progressPct">0%</span>
            <span class="sub">Responded</span>
          </div>
        </div>
      </div>

      <div class="viz-card">
        <h3>Guest Status Breakdown</h3>
        <div class="doughnut-wrap">
          <canvas id="statusDoughnut"></canvas>
        </div>
        <div class="legend-row">
          <span class="legend-item"><span class="legend-dot" style="background:#5B6B4E;"></span>Confirmed</span>
          <span class="legend-item"><span class="legend-dot" style="background:#DCC7A0;"></span>Pending</span>
          <span class="legend-item"><span class="legend-dot" style="background:#D9534F;"></span>Not Attending</span>
        </div>
      </div>

    </div>

  </div>

  <!-- ============ INVITATIONS TAB ============ -->
  <div class="tab-panel" id="tab-invitations">
    <div class="section">
      <div class="section-header">
        <div class="section-title">Invitations</div>
        <div class="header-actions">
          <div class="search-box">
            <input type="text" id="invitationSearch" placeholder="Search by name...">
          </div>
          <button class="add-btn" onclick="openAddGuest()">Add Guest</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Recipient Name</th>
            <th># Guests</th>
            <th>Invitation Link</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="invitationTable"></tbody>
      </table>
    </div>
  </div>

  <!-- ============ RSVP TAB ============ -->
  <div class="tab-panel" id="tab-rsvp">
    <div class="section">
      <div class="section-header">
        <div class="section-title">RSVP Responses</div>
        <div class="header-actions">
          <div class="search-box">
            <input type="text" id="rsvpSearch" placeholder="Search email or code...">
          </div>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Invite Code</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="rsvpTable"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- ============ ADD/EDIT GUEST MODAL ============ -->
<div class="modal" id="guestModal">
  <div class="modal-content">
    <h2 id="guestModalTitle">Add Guest</h2>

    <label>Recipient Name</label>
    <input id="guestName" placeholder="e.g. Tita Baby">

    <label>Allowed Guests</label>
    <input id="allowedGuest" type="number" min="1" placeholder="e.g. 2">

    <button class="save-btn" onclick="saveGuest()">Save Guest</button>
  </div>
</div>

<script>

const SUPABASE_URL = "https://rprjwbdnzllmglwjbllg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcmp3YmRuemxsbWdsd2pibGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDQxODEsImV4cCI6MjA5OTA4MDE4MX0.ZhIIU8_M_Ff1bzBePaC-3lkekdXEkJ727qjP5wWm3j0";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let editingId = null;
let allInvitations = [];
let allRsvp = [];
let doughnutChart = null;

const RING_RADIUS = 78;
const RING_CIRCUMFERENCE = 2 * Math.PI * RING_RADIUS;

/* =========================================================
   AUTH GUARD
   ========================================================= */
(async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    window.location = "/dashboard/login.html";
    return;
  }
  loadDashboard();
})();

/* =========================================================
   TABS
   ========================================================= */
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === name);
  });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === 'tab-' + name);
  });
}

/* =========================================================
   LOAD EVERYTHING
   ========================================================= */
async function loadDashboard() {
  const { data: invitations } = await supabaseClient.from('invitations').select('*').order('recipient_name');
  const { data: rsvp } = await supabaseClient.from('rsvp').select('*').order('created_at', { ascending: false });

  allInvitations = invitations || [];
  allRsvp = rsvp || [];

  renderSummary();
  renderProgressRing();
  renderDoughnut();
  renderInvitationsTable();
  renderRsvpTable();
}

/* =========================================================
   DASHBOARD: cards, ring, doughnut
   ========================================================= */
function computeCounts() {
  let totalGuests = 0;
  allInvitations.forEach(i => { totalGuests += Number(i.allowed_guest || 0); });

  const confirmed = allRsvp.filter(x => !x.not_attending).length;
  const notAttending = allRsvp.filter(x => x.not_attending).length;
  const pending = Math.max(allInvitations.length - confirmed - notAttending, 0);

  return { totalGuests, confirmed, notAttending, pending };
}

function renderSummary() {
  const { totalGuests, confirmed, notAttending, pending } = computeCounts();
  document.getElementById("totalGuests").textContent = totalGuests;
  document.getElementById("confirmedGuests").textContent = confirmed;
  document.getElementById("notAttendingGuests").textContent = notAttending;
  document.getElementById("pendingGuests").textContent = pending;
}

function renderProgressRing() {
  const { confirmed, notAttending } = computeCounts();
  const total = allInvitations.length;
  const responded = confirmed + notAttending;
  const pct = total > 0 ? Math.round((responded / total) * 100) : 0;

  const fill = document.getElementById('progressRingFill');
  fill.style.strokeDasharray = `${RING_CIRCUMFERENCE}`;
  fill.style.strokeDashoffset = `${RING_CIRCUMFERENCE - (pct / 100) * RING_CIRCUMFERENCE}`;

  document.getElementById('progressPct').textContent = pct + '%';
}

function renderDoughnut() {
  const { confirmed, notAttending, pending } = computeCounts();
  const ctx = document.getElementById('statusDoughnut').getContext('2d');

  const data = {
    labels: ['Confirmed', 'Pending', 'Not Attending'],
    datasets: [{
      data: [confirmed, pending, notAttending],
      backgroundColor: ['#5B6B4E', '#DCC7A0', '#D9534F'],
      borderWidth: 0,
    }]
  };

  if (doughnutChart) {
    doughnutChart.data = data;
    doughnutChart.update();
    return;
  }

  doughnutChart = new Chart(ctx, {
    type: 'doughnut',
    data,
    options: {
      cutout: '68%',
      plugins: { legend: { display: false } },
      responsive: true,
    }
  });
}

/* =========================================================
   INVITATIONS TAB
   ========================================================= */
function renderInvitationsTable() {
  const query = document.getElementById('invitationSearch').value.trim().toLowerCase();
  const tbody = document.getElementById("invitationTable");

  const filtered = query
    ? allInvitations.filter(row => (row.recipient_name || '').toLowerCase().includes(query))
    : allInvitations;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="4">${query ? 'No guests match your search.' : 'No guests added yet.'}</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(row => `
    <tr>
      <td>${escapeHtml(row.recipient_name)}</td>
      <td>${row.allowed_guest}</td>
      <td>
        <button class="action-btn copy" onclick="copyLink('${escapeAttr(row.invite_code)}')">Copy Link</button>
      </td>
      <td>
        <button class="action-btn edit" onclick="editGuest('${row.id}','${escapeAttr(row.recipient_name)}',${row.allowed_guest})">Edit</button>
        <button class="action-btn delete" onclick="deleteGuest('${row.id}')">Delete</button>
      </td>
    </tr>
  `).join('');
}

document.getElementById('invitationSearch').addEventListener('input', renderInvitationsTable);

function openAddGuest() {
  editingId = null;
  document.getElementById("guestModalTitle").textContent = "Add Guest";
  document.getElementById("guestName").value = '';
  document.getElementById("allowedGuest").value = '';
  document.getElementById("guestModal").classList.add("show");
}

function editGuest(id, name, allowed) {
  editingId = id;
  document.getElementById("guestModalTitle").textContent = "Edit Guest";
  document.getElementById("guestName").value = name;
  document.getElementById("allowedGuest").value = allowed;
  document.getElementById("guestModal").classList.add("show");
}

async function saveGuest() {
  const recipient_name = document.getElementById("guestName").value.trim();
  const allowed_guest = document.getElementById("allowedGuest").value;

  if (!recipient_name || !allowed_guest) {
    alert("Please fill in both the name and number of allowed guests.");
    return;
  }

  if (editingId) {
    await supabaseClient.from('invitations').update({ recipient_name, allowed_guest }).eq('id', editingId);
  } else {
    await supabaseClient.from('invitations').insert({
      recipient_name,
      allowed_guest,
      invite_code: crypto.randomUUID()
    });
  }

  document.getElementById("guestModal").classList.remove("show");
  loadDashboard();
}

async function deleteGuest(id) {
  if (!confirm("Delete this guest's invitation?")) return;
  await supabaseClient.from('invitations').delete().eq('id', id);
  loadDashboard();
}

function copyLink(inviteCode) {
  const link = `${window.location.origin}/invitation/?code=${inviteCode}`;
  navigator.clipboard.writeText(link);
  alert("Invitation link copied");
}

/* =========================================================
   RSVP TAB
   ========================================================= */
function renderRsvpTable() {
  const query = document.getElementById('rsvpSearch').value.trim().toLowerCase();
  const tbody = document.getElementById("rsvpTable");

  const filtered = query
    ? allRsvp.filter(row =>
        (row.email || '').toLowerCase().includes(query) ||
        (row.invite_code || '').toLowerCase().includes(query))
    : allRsvp;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="5">${query ? 'No responses match your search.' : 'No RSVP responses yet.'}</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(row => `
    <tr>
      <td>${escapeHtml(row.email || '')}</td>
      <td>${escapeHtml(row.invite_code || '')}</td>
      <td>${escapeHtml(row.reason || '')}</td>
      <td>
        <span class="status-pill ${row.not_attending ? 'status-not-attending' : 'status-confirmed'}">
          ${row.not_attending ? 'Not Attending' : 'Confirmed'}
        </span>
      </td>
      <td>
        <button class="action-btn delete" onclick="deleteRSVP('${row.id}')">Delete</button>
      </td>
    </tr>
  `).join('');
}

document.getElementById('rsvpSearch').addEventListener('input', renderRsvpTable);

async function deleteRSVP(id) {
  if (!confirm("Delete this RSVP response?")) return;
  await supabaseClient.from('rsvp').delete().eq('id', id);
  loadDashboard();
}

/* =========================================================
   MISC
   ========================================================= */
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}
function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'");
}

async function logout() {
  await supabaseClient.auth.signOut();
  window.location = "/dashboard/login.html";
}

document.getElementById("guestModal").addEventListener("click", (e) => {
  if (e.target.id === "guestModal") {
    e.target.classList.remove("show");
  }
});

</script>

</body>
</html>
