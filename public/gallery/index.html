<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jayden Kai Photoshoot Gallery</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
    font-size:40px;
    width:60px;
    height:60px;
    border-radius:50%;
    cursor:pointer;
    backdrop-filter:blur(10px);
}

.prev-btn{
    left:20px;
}

.next-btn{
    right:20px;
}

.nav-btn:hover{
    background:rgba(255,255,255,.25);
}

.close-btn{
    z-index:10001;
}

:root{
    --cream:#FBF7F1;
    --paper:#FFFFFF;
    --sage:#93A17E;
    --sage-deep:#5B6B4E;
    --gold:#B08D57;
    --gold-soft:#DCC7A0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--cream);
    font-family:'Montserrat',sans-serif;
}

.hero{
    padding:80px 20px 50px;
    text-align:center;
}

.hero h1{
    font-family:'Cormorant Garamond',serif;
    font-size:3rem;
    color:var(--sage-deep);
    margin-bottom:10px;
}

.hero p{
    color:#666;
}

.gallery{
    max-width:1400px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.photo-card{
    overflow:hidden;
    border-radius:20px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.3s;
}

.photo-card:hover{
    transform:translateY(-5px);
}

.photo-card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.loading{
    text-align:center;
    padding:60px;
    color:var(--sage-deep);
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox.show{
    display:flex;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
}

.close-btn{
    position:absolute;
    top:20px;
    right:25px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

</style>
</head>
<body>
<nav class="site-nav">
  <a href="#home" class="nav-mark">Jayden Kai</a>

  <div class="nav-menu" id="navMenu">
    <a href="#home" class="nav-link active" data-target="home">Home</a>
    <a href="#details" class="nav-link" data-target="details">Details</a>
    <a href="#notes" class="nav-link" data-target="notes">Notes</a>
    <a href="#rsvp" class="nav-link" data-target="rsvp">RSVP</a>
    <a href="#dress" class="nav-link" data-target="dress">Dress Code</a>
    <a href="/gallery" class="nav-link" data-target="gallery">Gallery</a>
    <div class="nav-bloom" id="navBloom">
      <svg viewBox="0 0 24 24">
        <g>
          <circle cx="5.5" cy="6" r="3" fill="#C9A567"/>
          <circle cx="18.5" cy="6" r="3" fill="#C9A567"/>
          <circle cx="5.5" cy="6" r="1.3" fill="#5B6B4E" opacity="0.25"/>
          <circle cx="18.5" cy="6" r="1.3" fill="#5B6B4E" opacity="0.25"/>
          <circle cx="12" cy="13" r="8" fill="#D8B784"/>
          <ellipse cx="12" cy="15.6" rx="3.6" ry="2.8" fill="#F3E6CC"/>
          <circle cx="9" cy="11.3" r="1" fill="#3A3A33"/>
          <circle cx="15" cy="11.3" r="1" fill="#3A3A33"/>
          <circle cx="12" cy="14.4" r="0.9" fill="#3A3A33"/>
        </g>
      </svg>
    </div>
  </div>

  <button class="nav-toggle" id="navToggle" aria-label="Open menu"><span></span></button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="#home" data-target="home" class="active">Home</a>
  <a href="#details" data-target="details">Details</a>
  <a href="#notes" data-target="notes">Notes</a>
  <a href="#rsvp" data-target="rsvp">RSVP</a>
  <a href="#dress" data-target="dress">Dress Code</a>
  <a href="/gallery" data-target="gallery">Gallery</a>
</div>
<section class="hero">
    <h1>Jayden Kai</h1>
    <p>Photoshoot Gallery</p>
</section>

<div id="loading" class="loading">
    Loading photos...
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">

    <span class="close-btn" id="closeBtn">&times;</span>

    <button class="nav-btn prev-btn" id="prevBtn">
        &#10094;
    </button>

    <img id="lightboxImage">

    <button class="nav-btn next-btn" id="nextBtn">
        &#10095;
    </button>

</div>

<script>

const SUPABASE_URL =
"https://rprjwbdnzllmglwjbllg.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcmp3YmRuemxsbWdsd2pibGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDQxODEsImV4cCI6MjA5OTA4MDE4MX0.ZhIIU8_M_Ff1bzBePaC-3lkekdXEkJ727qjP5wWm3j0";

const { createClient } = supabase;

const supabaseClient =
createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const gallery =
document.getElementById("gallery");

const loading =
document.getElementById("loading");

const lightbox =
document.getElementById("lightbox");

const lightboxImage =
document.getElementById("lightboxImage");

const prevBtn =
document.getElementById("prevBtn");

const nextBtn =
document.getElementById("nextBtn");

const closeBtn =
document.getElementById("closeBtn");

let photos = [];
let currentIndex = 0;

async function loadPhotos() {

    const { data, error } =
        await supabaseClient.storage
        .from("Photoshoot")
        .list("", {
            sortBy:{
                column:"name",
                order:"asc"
            }
        });

    if(error){
        loading.innerHTML = error.message;
        return;
    }

    loading.style.display = "none";

    photos = data
        .filter(file =>
            /\.(jpg|jpeg|png|webp)$/i.test(file.name)
        )
        .map(file =>
            `${SUPABASE_URL}/storage/v1/object/public/Photoshoot/${encodeURIComponent(file.name)}`
        );

    photos.forEach((imageUrl,index)=>{

        const card =
            document.createElement("div");

        card.className =
            "photo-card";

        card.innerHTML =
            `<img src="${imageUrl}" loading="lazy">`;

        card.addEventListener("click",()=>{

            currentIndex = index;

            openLightbox();

        });

        gallery.appendChild(card);

    });

}

function openLightbox(){

    lightboxImage.src =
        photos[currentIndex];

    lightbox.classList.add("show");

}

function nextPhoto(){

    currentIndex++;

    if(currentIndex >= photos.length){
        currentIndex = 0;
    }

    openLightbox();

}

function prevPhoto(){

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = photos.length - 1;
    }

    openLightbox();

}

nextBtn.addEventListener(
    "click",
    e=>{
        e.stopPropagation();
        nextPhoto();
    }
);

prevBtn.addEventListener(
    "click",
    e=>{
        e.stopPropagation();
        prevPhoto();
    }
);

closeBtn.addEventListener(
    "click",
    ()=>{
        lightbox.classList.remove("show");
    }
);

lightbox.addEventListener(
    "click",
    ()=>{
        lightbox.classList.remove("show");
    }
);

document.addEventListener(
    "keydown",
    e=>{

        if(!lightbox.classList.contains("show"))
            return;

        if(e.key==="ArrowRight")
            nextPhoto();

        if(e.key==="ArrowLeft")
            prevPhoto();

        if(e.key==="Escape")
            lightbox.classList.remove("show");

    }
);

/* Swipe support */

let startX = 0;

lightbox.addEventListener(
    "touchstart",
    e=>{
        startX =
            e.touches[0].clientX;
    }
);

lightbox.addEventListener(
    "touchend",
    e=>{

        let endX =
            e.changedTouches[0].clientX;

        if(startX - endX > 50)
            nextPhoto();

        if(endX - startX > 50)
            prevPhoto();

    }
);
loadPhotos();

document
.getElementById("lightbox")
.addEventListener("click", () => {

    document
    .getElementById("lightbox")
    .classList
    .remove("show");
const lightbox = document.getElementById("lightbox");
const lightboxImage = document.getElementById("lightboxImage");

function openLightbox(url) {
    lightboxImage.src = url;
    lightbox.classList.add("show");
}

lightbox.addEventListener("click", () => {
    lightbox.classList.remove("show");
});
});

</script>
</body>
</html>
