<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jayden Kai Photoshoot Gallery</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
    --cream:#FBF7F1;
    --paper:#FFFFFF;
    --sage:#93A17E;
    --sage-deep:#5B6B4E;
    --gold:#B08D57;
    --gold-soft:#DCC7A0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--cream);
    font-family:'Montserrat',sans-serif;
}

.hero{
    padding:80px 20px 50px;
    text-align:center;
}

.hero h1{
    font-family:'Cormorant Garamond',serif;
    font-size:3rem;
    color:var(--sage-deep);
    margin-bottom:10px;
}

.hero p{
    color:#666;
}

.gallery{
    max-width:1400px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.photo-card{
    overflow:hidden;
    border-radius:20px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.3s;
}

.photo-card:hover{
    transform:translateY(-5px);
}

.photo-card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.loading{
    text-align:center;
    padding:60px;
    color:var(--sage-deep);
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox.show{
    display:flex;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
}

.close-btn{
    position:absolute;
    top:20px;
    right:25px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

</style>
</head>
<body>

<section class="hero">
    <h1>Jayden Kai</h1>
    <p>Photoshoot Gallery</p>
</section>

<div id="loading" class="loading">
    Loading photos...
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
    <span class="close-btn">&times;</span>
    <img id="lightboxImage">
</div>

<script>

const SUPABASE_URL = "https://rprjwbdnzllmglwjbllg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcmp3YmRuemxsbWdsd2pibGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDQxODEsImV4cCI6MjA5OTA4MDE4MX0.ZhIIU8_M_Ff1bzBePaC-3lkekdXEkJ727qjP5wWm3j0";

const { createClient } = supabase;

const supabaseClient = createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const BUCKET = "Photoshoot";

const gallery = document.getElementById("gallery");
const loading = document.getElementById("loading");

async function loadPhotos() {

    try {

        console.log("Loading photos...");

        const { data, error } = await supabaseClient.storage
            .from(BUCKET)
            .list("", {
                limit: 100,
                offset: 0,
                sortBy: {
                    column: "name",
                    order: "asc"
                }
            });

        console.log("Files:", data);
        console.log("Error:", error);

        if (error) {
            loading.innerHTML = "Error loading photos.";
            console.error(error);
            return;
        }

        if (!data || data.length === 0) {
            loading.innerHTML = "No photos found.";
            return;
        }

        loading.style.display = "none";

        data.forEach(file => {

            if (
                !file.name.toLowerCase().endsWith(".jpg") &&
                !file.name.toLowerCase().endsWith(".jpeg") &&
                !file.name.toLowerCase().endsWith(".png") &&
                !file.name.toLowerCase().endsWith(".webp")
            ) {
                return;
            }

            const { data: publicUrlData } =
                supabaseClient.storage
                    .from(BUCKET)
                    .getPublicUrl(file.name);

            const imageUrl = publicUrlData.publicUrl;

            console.log("Image URL:", imageUrl);

            const card = document.createElement("div");
            card.className = "photo-card";

            const img = document.createElement("img");
            img.src = imageUrl;
            img.loading = "lazy";

            img.onerror = () => {
                console.error("Failed to load:", imageUrl);
            };

            card.appendChild(img);

            card.addEventListener("click", () => {
                openLightbox(imageUrl);
            });

            gallery.appendChild(card);
        });

    } catch (err) {

        console.error(err);
        loading.innerHTML = "Unexpected error. Check browser console.";
    }
}

loadPhotos();

const lightbox = document.getElementById("lightbox");
const lightboxImage = document.getElementById("lightboxImage");

function openLightbox(url) {
    lightboxImage.src = url;
    lightbox.classList.add("show");
}

lightbox.addEventListener("click", () => {
    lightbox.classList.remove("show");
});

</script>
</body>
</html>
