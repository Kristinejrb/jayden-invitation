<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jayden Kai Photoshoot Gallery</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
    --cream:#FBF7F1;
    --paper:#FFFFFF;
    --sage:#93A17E;
    --sage-deep:#5B6B4E;
    --gold:#B08D57;
    --gold-soft:#DCC7A0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--cream);
    font-family:'Montserrat',sans-serif;
}

.hero{
    padding:80px 20px 50px;
    text-align:center;
}

.hero h1{
    font-family:'Cormorant Garamond',serif;
    font-size:3rem;
    color:var(--sage-deep);
    margin-bottom:10px;
}

.hero p{
    color:#666;
}

.gallery{
    max-width:1400px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.photo-card{
    overflow:hidden;
    border-radius:20px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.3s;
}

.photo-card:hover{
    transform:translateY(-5px);
}

.photo-card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.loading{
    text-align:center;
    padding:60px;
    color:var(--sage-deep);
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox.show{
    display:flex;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
}

.close-btn{
    position:absolute;
    top:20px;
    right:25px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

</style>
</head>
<body>

<section class="hero">
    <h1>Jayden Kai</h1>
    <p>Photoshoot Gallery</p>
</section>

<div id="loading" class="loading">
    Loading photos...
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
    <span class="close-btn">&times;</span>
    <img id="lightboxImage">
</div>

<script>

const SUPABASE_URL = "https://rprjwbdnzllmglwjbllg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcmp3YmRuemxsbWdsd2pibGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDQxODEsImV4cCI6MjA5OTA4MDE4MX0.ZhIIU8_M_Ff1bzBePaC-3lkekdXEkJ727qjP5wWm3j0";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const gallery = document.getElementById("gallery");
const loading = document.getElementById("loading");

async function loadPhotos(){

    const { data, error } = await supabaseClient
        .storage
        .from("photoshoot")
        .list("", {
            limit: 1000,
            sortBy: { column: "name", order: "asc" }
        });

    if(error){

        loading.innerHTML = "Unable to load photos.";
        console.error(error);
        return;
    }

    loading.style.display = "none";

    data.forEach(file => {

        if(!file.name.match(/\.(jpg|jpeg|png|webp)$/i)){
            return;
        }

        const { data: publicUrlData } =
            supabaseClient.storage
                .from("photoshoot")
                .getPublicUrl(file.name);

        const url = publicUrlData.publicUrl;

        const card = document.createElement("div");
        card.className = "photo-card";

        card.innerHTML = `
            <img src="${url}" loading="lazy">
        `;

        card.addEventListener("click", () => {
            openLightbox(url);
        });

        gallery.appendChild(card);
    });
}

loadPhotos();

const lightbox = document.getElementById("lightbox");
const lightboxImage = document.getElementById("lightboxImage");

function openLightbox(url){
    lightbox.classList.add("show");
    lightboxImage.src = url;
}

lightbox.addEventListener("click", () => {
    lightbox.classList.remove("show");
});

</script>

</body>
</html>
